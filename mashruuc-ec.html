<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<style>
:root{
 --bg:#0d1117; --card:#161b22; --bdr:#26303d; --txt:#e6edf3; --mut:#8b98a5;
 --am:#f0a020; --gr:#2ea043; --rd:#e5484d; --bl:#2f81f7; --pu:#a371f7;
 --sh:0 4px 14px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:78px}
.hdr{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--bdr);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
.hdr h1{margin:0;font-size:17px;letter-spacing:.3px}
.hdr small{color:var(--mut);font-size:11px;display:block;font-weight:400}
.pg{display:none;padding:14px}
.pg.act{display:block}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--sh)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px}
.stat .lbl{color:var(--mut);font-size:11px;margin-bottom:4px}
.stat .val{font-size:19px;font-weight:700}
.rbtn{width:100%;background:var(--am);color:#111;border:0;border-radius:11px;padding:13px;font-size:15px;font-weight:700;margin-top:8px}
.sbtn{background:transparent;color:var(--txt);border:1px solid var(--bdr);border-radius:9px;padding:8px 12px;font-size:13px}
.sbtn.dng{color:var(--rd);border-color:var(--rd)}
.sbtn.ok{color:var(--gr);border-color:var(--gr)}
input,select,textarea{width:100%;background:#0b0f14;border:1px solid var(--bdr);color:var(--txt);border-radius:10px;padding:11px;font-size:15px;margin-bottom:9px;font-family:inherit}
label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bdr);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:60}
.ni{flex:1;text-align:center;padding:11px 2px;color:var(--mut);font-size:10px;cursor:pointer}
.ni .ic{font-size:19px;display:block;margin-bottom:2px}
.ni.act{color:var(--am)}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end}
.ovl.open{display:flex}
.sheet{background:var(--card);width:100%;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px;padding-bottom:calc(24px + env(safe-area-inset-bottom));border-top:1px solid var(--bdr)}
.sheet h3{margin:0 0 14px}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr)}
.row:last-child{border-bottom:0}
.mut{color:var(--mut);font-size:12px}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.p-gr{background:rgba(46,160,67,.16);color:var(--gr)}
.p-am{background:rgba(240,160,32,.16);color:var(--am)}
.p-rd{background:rgba(229,72,77,.16);color:var(--rd)}
.p-bl{background:rgba(47,129,247,.16);color:var(--bl)}
.p-pu{background:rgba(163,113,247,.18);color:var(--pu)}
.bar{height:8px;background:#0b0f14;border-radius:6px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--gr)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--mut);font-weight:600;padding:7px 4px;border-bottom:1px solid var(--bdr);font-size:11px}
.tbl td{padding:8px 4px;border-bottom:1px solid var(--bdr)}
.seg{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.seg button{min-width:28%}
.seg button{flex:1;background:#0b0f14;border:1px solid var(--bdr);color:var(--mut);border-radius:9px;padding:9px;font-size:12px;font-weight:600}
.seg button.on{background:var(--am);color:#111;border-color:var(--am)}
.att{display:flex;gap:5px;margin-top:7px}
.att button{flex:1;background:#0b0f14;border:1px solid var(--bdr);color:var(--mut);border-radius:8px;padding:8px;font-size:12px;font-weight:600}
.att button.f{background:var(--gr);color:#fff;border-color:var(--gr)}
.att button.h{background:var(--am);color:#111;border-color:var(--am)}
.att button.a{background:var(--rd);color:#fff;border-color:var(--rd)}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:13px}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.on{opacity:1}
.login{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.login.hide{display:none}
.lbox{width:100%;max-width:330px;text-align:center}
.lbox .logo{font-size:44px;margin-bottom:6px}
</style>
</head>

<script>
var SB_URL = 'https://prlfayottmrboungrttt.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybGZheW90dG1yYm91bmdydHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDgyNDgsImV4cCI6MjA5NjAyNDI0OH0.O7fpDiP009br3_ioK2_v0MjMSTKmJtaJEUE88lS_3YI';
var APP_PIN = '1234';

var DB = { projects:[], workers:[], rates:[], attend:[], expense:[], payin:[], owner:[], transfer:[] };
var ACCTS = ['cash','zaad','edahab','bank'];
var ACCT_LBL = { cash:'Cash', zaad:'ZAAD', edahab:'e-Dahab', bank:'Bank' };
var UI = { page:'dash', day:'', dayProject:0, repProject:0 };

function h(){ return { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation' }; }
function api(t,q){ return SB_URL+'/rest/v1/'+t+(q?('?'+q):''); }

function sbGet(t,q){
 return fetch(api(t,q||'select=*'),{headers:h()}).then(function(r){ return r.json(); }).catch(function(){ return []; });
}
function sbPost(t,body){
 return fetch(api(t),{method:'POST',headers:h(),body:JSON.stringify(body)}).then(function(r){ return r.json(); });
}
function sbUpsert(t,body,conf){
 var hh = h(); hh['Prefer'] = 'resolution=merge-duplicates,return=representation';
 return fetch(api(t,conf?('on_conflict='+conf):''),{method:'POST',headers:hh,body:JSON.stringify(body)}).then(function(r){ return r.json(); });
}
function sbPatch(t,id,body){
 return fetch(api(t,'id=eq.'+id),{method:'PATCH',headers:h(),body:JSON.stringify(body)}).then(function(r){ return r.json(); });
}
function sbDel(t,id){
 return fetch(api(t,'id=eq.'+id),{method:'DELETE',headers:h()});
}

function esc(s){
 if(s===null||s===undefined) return '';
 return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function money(n){
 n = Number(n)||0;
 return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function today(){
 var d = new Date(), m = d.getMonth()+1, dd = d.getDate();
 return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;
}
function toast(m){
 var t = document.getElementById('toast');
 t.textContent = m; t.className = 'toast on';

function openSheet(html){

 document.getElementById('ovl').className = 'ovl open';
}
function closeSheet(){ document.getElementById('ovl').className = 'ovl'; }
function val(id){ var e = document.getElementById(id); return e ? e.value : ''; }
function num(id){ return Number(val(id))||0; }
function acctOpts(id,dflt){
 var s = "<select id='"+id+"'>";
 for(var i=0;i<ACCTS.length;i++){
  s += "<option value='"+ACCTS[i]+"'"+(ACCTS[i]==dflt?" selected":"")+">"+ACCT_LBL[ACCTS[i]]+"</option>";
 }
 return s + "</select>";
}
function acctBal(a){
 var b = 0, i;
 for(i=0;i<DB.payin.length;i++){ if((DB.payin[i].acct||'zaad')==a) b += Number(DB.payin[i].amount)||0; }
 for(i=0;i<DB.attend.length;i++){ if(DB.attend[i].paid && (DB.attend[i].acct||'cash')==a) b -= Number(DB.attend[i].amount)||0; }
 for(i=0;i<DB.expense.length;i++){ if((DB.expense[i].acct||'cash')==a) b -= Number(DB.expense[i].amount)||0; }
 for(i=0;i<DB.owner.length;i++){ if((DB.owner[i].acct||'cash')==a) b -= Number(DB.owner[i].amount)||0; }
 for(i=0;i<DB.transfer.length;i++){
  if(DB.transfer[i].to_acct==a) b += Number(DB.transfer[i].amount)||0;
  if(DB.transfer[i].from_acct==a) b -= Number(DB.transfer[i].amount)||0;
 }
 return b;
}
function projName(id){
 for(var i=0;i<DB.projects.length;i++){ if(DB.projects[i].id==id) return DB.projects[i].name; }
 return '-';
}
function workName(id){
 for(var i=0;i<DB.workers.length;i++){ if(DB.workers[i].id==id) return DB.workers[i].name; }
 return '-';
}
function wSkill(wid){
 for(var i=0;i<DB.workers.length;i++){ if(DB.workers[i].id==wid) return DB.workers[i].skill||''; }
 return '';
}
function isOwner(wid){
 for(var i=0;i<DB.workers.length;i++){ if(DB.workers[i].id==wid) return !!DB.workers[i].is_owner; }
 return false;
}
function rateOf(pid,wid){
 for(var i=0;i<DB.rates.length;i++){ if(DB.rates[i].project_id==pid && DB.rates[i].worker_id==wid) return Number(DB.rates[i].rate)||0; }
 return 0;
}
function crew(pid){
 var out = [];
 for(var i=0;i<DB.rates.length;i++){ if(DB.rates[i].project_id==pid) out.push(DB.rates[i]); }
 return out;
}

/* ---------- XISAABTA MASHRUUCA ---------- */
function calc(pid){
 var o = { contract:0, labor:0, ownw:0, mat:0, recv:0, unpaid:0, days:0 };
 for(var i=0;i<DB.projects.length;i++){ if(DB.projects[i].id==pid) o.contract = Number(DB.projects[i].contract_amount)||0; }
 var seen = {};
 for(var a=0;a<DB.attend.length;a++){
  var r = DB.attend[a];
  if(r.project_id!=pid) continue;
  if(isOwner(r.worker_id)) o.ownw += Number(r.amount)||0;
  else o.labor += Number(r.amount)||0;
  if(!r.paid) o.unpaid += Number(r.amount)||0;
  seen[r.adate] = 1;
 }
 for(var k in seen){ if(seen.hasOwnProperty(k)) o.days++; }
 for(var e=0;e<DB.expense.length;e++){ if(DB.expense[e].project_id==pid) o.mat += Number(DB.expense[e].amount)||0; }
 for(var p=0;p<DB.payin.length;p++){ if(DB.payin[p].project_id==pid) o.recv += Number(DB.payin[p].amount)||0; }
 o.cost = o.labor + o.ownw + o.mat;
 o.profit = o.contract - o.cost;
 o.margin = o.contract > 0 ? (o.profit / o.contract * 100) : 0;
 o.due = o.contract - o.recv;
 o.excess = o.recv > o.contract ? (o.recv - o.contract) : 0;
 o.baaqi = o.contract > o.recv ? (o.contract - o.recv) : 0;
 o.pct = o.contract > 0 ? Math.min(100, Math.round(o.recv/o.contract*100)) : 0;
 return o;
}
function calcAll(){
 var t = { contract:0, labor:0, ownw:0, mat:0, recv:0, profit:0, unpaid:0, due:0, active:0 };
 for(var i=0;i<DB.projects.length;i++){
  var p = DB.projects[i], c = calc(p.id);
  t.contract += c.contract; t.labor += c.labor; t.ownw += c.ownw; t.mat += c.mat;
  t.recv += c.recv; t.profit += c.profit; t.unpaid += c.unpaid; t.due += c.due;
  if(p.status=='socda') t.active++;
 }
 return t;
}

/* ---------- LOAD ---------- */
function loadAll(){
 return Promise.all([
  sbGet('ec_projects','select=*&order=id.desc'),
  sbGet('ec_workers','select=*&order=name.asc'),
  sbGet('ec_rates','select=*'),
  sbGet('ec_attend','select=*&order=adate.desc&limit=3000'),
  sbGet('ec_expense','select=*&order=edate.desc&limit=2000'),
  sbGet('ec_payin','select=*&order=pdate.desc&limit=1000'),
  sbGet('ec_owner','select=*&order=odate.desc&limit=1000'),
  sbGet('ec_transfer','select=*&order=tdate.desc&limit=500')
 ]).then(function(res){
  DB.projects = res[0]&&res[0].length!==undefined?res[0]:[];
  DB.workers  = res[1]&&res[1].length!==undefined?res[1]:[];
  DB.rates    = res[2]&&res[2].length!==undefined?res[2]:[];
  DB.attend   = res[3]&&res[3].length!==undefined?res[3]:[];
  DB.expense  = res[4]&&res[4].length!==undefined?res[4]:[];
  DB.payin    = res[5]&&res[5].length!==undefined?res[5]:[];
  DB.owner    = res[6]&&res[6].length!==undefined?res[6]:[];
  DB.transfer = res[7]&&res[7].length!==undefined?res[7]:[];
 });
}

/* ---------- DASHBOARD ---------- */
function renderDash(){
 var t = calcAll(), s = '';
 s += "<div class='grid2'>";
 s += "<div class='stat'><div class='lbl'>Qandaraas guud</div><div class='val'>"+money(t.contract)+"</div></div>";
 s += "<div class='stat'><div class='lbl'>Faa&#39;iido saafi</div><div class='val' style='color:"+(t.profit>=0?'var(--gr)':'var(--rd)')+"'>"+money(t.profit)+"</div></div>";
 s += "<div class='stat'><div class='lbl'>Lacag la helay</div><div class='val' style='color:var(--bl)'>"+money(t.recv)+"</div></div>";
 s += "<div class='stat'><div class='lbl'>Lagu leeyahay</div><div class='val' style='color:var(--am)'>"+money(t.due)+"</div></div>";
 s += "</div>";

 s += "<div class='card'><div class='row'><span class='mut'>Yoomiyaha shaqaalaha</span><b>"+money(t.labor)+"</b></div>";
 s += "<div class='row'><span class='mut'>Yoomiyahaaga (qandaraasaha)</span><b style='color:var(--pu)'>"+money(t.ownw)+"</b></div>";
 s += "<div class='row'><span class='mut'>Kharashka alaabta</span><b>"+money(t.mat)+"</b></div>";
 s += "<div class='row'><span class='mut'>Yoomiye aan la bixin</span><b style='color:var(--rd)'>"+money(t.unpaid)+"</b></div>";
 var tin = 0;
 for(var q=0;q<DB.payin.length;q++){ if(DB.payin[q].pdate==today()) tin += Number(DB.payin[q].amount)||0; }
 s += "<div class='row'><span class='mut'>Maanta laga qaatay shirkadaha</span><b style='color:var(--bl)'>"+money(tin)+"</b></div>";
 s += "<div class='row'><span class='mut'>Mashaariic socda</span><b>"+t.active+"</b></div></div>";

 s += "<h3 style='margin:16px 0 8px;font-size:14px'>Mashaariicda</h3>";
 if(!DB.projects.length){ s += "<div class='empty'>Wali mashruuc ma jiro. Tag tab-ka Mashaariic.</div>"; }
 for(var i=0;i<DB.projects.length;i++){
  var p = DB.projects[i], c = calc(p.id);
  var pct = c.contract>0 ? Math.min(100, Math.round(c.cost/c.contract*100)) : 0;
  var cls = p.status=='dhamaaday' ? 'p-gr' : (p.status=='hakad' ? 'p-rd' : 'p-am');
  s += "<div class='card' onclick='projDetail("+p.id+")'>";
  s += "<div class='row' style='border:0;padding:0 0 6px'><b>"+esc(p.name)+"</b><span class='pill "+cls+"'>"+esc(p.status)+"</span></div>";
  s += "<div class='mut'><span class='pill p-bl'>"+esc(p.code||'-')+"</span> "+esc(p.client||'-')+" &middot; "+esc(p.location||'')+"</div>";
  s += "<div class='row' style='border:0;padding:8px 0 0'><span class='mut'>Qandaraas "+money(c.contract)+"</span><b style='color:"+(c.profit>=0?'var(--gr)':'var(--rd)')+"'>"+money(c.profit)+"</b></div>";
  s += "<div class='bar'><i style='width:"+pct+"%;background:"+(pct>90?'var(--rd)':'var(--gr)')+"'></i></div>";
  s += "<div class='mut' style='margin-top:5px'>Kharash "+money(c.cost)+" ("+pct+"%) &middot; "+c.days+" maalmood</div>";
  s += "</div>";
 }
 document.getElementById('pg-dash').innerHTML = s;
}

function nextCode(){
 var mx = 0;
 for(var i=0;i<DB.projects.length;i++){
  var c = DB.projects[i].code || '';
  var m = c.match(/(\d+)\s*$/);
  if(m && Number(m[1])>mx) mx = Number(m[1]);
 }
 var n = String(mx+1); while(n.length<3) n = '0'+n;
 return 'PRJ-'+n;
}
function projClient(id){
 for(var i=0;i<DB.projects.length;i++){ if(DB.projects[i].id==id) return DB.projects[i].client||'-'; }
 return '-';
}
function projCode(id){
 for(var i=0;i<DB.projects.length;i++){ if(DB.projects[i].id==id) return DB.projects[i].code||''; }
 return '';

function projForm(id){
 var p = { id:0, code:nextCode(), name:'', client:'', contract_amount:'', start_date:today(), end_date:'', location:'', status:'socda', note:'' };
 for(var i=0;i<DB.projects.length;i++){ if(DB.projects[i].id==id) p = DB.projects[i]; }
 var s = "<h3>"+(id?'Wax ka bedel':'Mashruuc cusub')+"</h3>";
 s += "<label>Lambarka mashruuca</label><input id='f_code' value=\""+esc(p.code||nextCode())+"\">";
 s += "<label>Magaca mashruuca</label><input id='f_name' value=\""+esc(p.name)+"\">";

  var task = DRAFT['t'+wid]!==undefined ? DRAFT['t'+wid] : (ex ? (ex.task||'') : '');
  var done = DRAFT['d'+wid]!==undefined ? DRAFT['d'+wid] : (ex ? !!ex.done : false);

  s += "<div class='card' style='padding:12px'>";

  s += "<div class='mut' style='font-size:11px'>"+esc(wSkill(wid))+" &middot; yoomiye "+money(rate)+"</div>";
  s += "<div class='att'>";
  s += "<button class='"+(st=='full'?'f':'')+"' onclick='setSt("+wid+",\"full\")'>Shaqeeyay</button>";
  s += "<button class='"+(st=='half'?'h':'')+"' onclick='setSt("+wid+",\"half\")'>Nus maalin</button>";
  s += "<button class='"+(st=='absent'?'a':'')+"' onclick='setSt("+wid+",\"absent\")'>Maqan</button>";
  s += "</div>";
  s += "<input style='margin:8px 0 0' placeholder='Hawsha maanta...' value=\""+esc(task)+"\" onchange='DRAFT[\"t"+wid+"\"]=this.value'>";
  s += "<div class='row' style='border:0;padding:6px 0 0'><span class='mut'>Ma dhammaystiray?</span>";
  s += "<button class='sbtn "+(done?'ok':'')+"' onclick='setDone("+wid+")'>"+(done?'Haa &#10003;':'Maya')+"</button></div>";
  if(ex) s += "<div class='mut' style='margin-top:6px'>"+(ex.paid?"<span class='pill p-gr'>La bixiyay</span>":"<span class='pill p-rd'>Lama bixin</span>")+"</div>";

 }

 document.getElementById('pg-day').innerHTML = s;
}
function dayShare(){
 var pid = UI.dayProject, cw = crew(pid);
 var m = 'WARQADDA MAALINTA\n' + UI.day + '\n' + projCode(pid) + ' - ' + projName(pid) + '\n' + projClient(pid) + '\n';
 m += '--------------------\n';
 var tot = 0, own = 0;
 for(var c=0;c<cw.length;c++){
  var wid = cw[c].worker_id, rate = Number(cw[c].rate)||0;
  var ex = attRow(pid,wid,UI.day);
  var st = DRAFT['s'+wid] || (ex ? ex.status : 'full');
  var amt = st=='full' ? rate : (st=='half' ? rate/2 : 0);
  var lbl = st=='full' ? '' : (st=='half' ? ' (nus)' : ' (MAQAN)');
  if(isOwner(wid)) own += amt; else tot += amt;
  m += workName(wid) + ' ' + wSkill(wid) + lbl + '\n   ' + money(amt) + '\n';
 }
 m += '--------------------\n';
 var de = 0;
 for(var q=0;q<DB.expense.length;q++){
  var x = DB.expense[q];
  if(x.project_id!=pid || x.edate!=UI.day) continue;
  de += Number(x.amount)||0;
  m += 'Kharash: ' + (x.note||x.category) + '  ' + money(x.amount) + '\n';
 }
 m += '--------------------\n';
 m += 'Yoomiye shaqaale: ' + money(tot) + '\n';
 if(own>0) m += 'Yoomiyahayga: ' + money(own) + '\n';
 m += 'Kharash: ' + money(de) + '\n';
 m += 'WADARTA: ' + money(tot+own+de);
 if(navigator.share){ navigator.share({ text:m }); }
 else { window.open('https://wa.me/?text='+encodeURIComponent(m),'_blank'); }
}
function setSt(wid,st){ DRAFT['s'+wid] = st; renderDay(); }
function setDone(wid){
 var ex = attRow(UI.dayProject,wid,UI.day);
 var cur = DRAFT['d'+wid]!==undefined ? DRAFT['d'+wid] : (ex ? !!ex.done : false);
 DRAFT['d'+wid] = !cur; renderDay();
}
function daySave(pay){
 var cw = crew(UI.dayProject), rows = [];
 for(var c=0;c<cw.length;c++){
  var wid = cw[c].worker_id, rate = Number(cw[c].rate)||0;
  var ex = attRow(UI.dayProject,wid,UI.day);
  var st = DRAFT['s'+wid] || (ex ? ex.status : 'full');
  var amt = st=='full' ? rate : (st=='half' ? rate/2 : 0);
  var task = DRAFT['t'+wid]!==undefined ? DRAFT['t'+wid] : (ex ? (ex.task||'') : '');
  var done = DRAFT['d'+wid]!==undefined ? DRAFT['d'+wid] : (ex ? !!ex.done : false);
  var paid = pay ? (amt>0) : (ex ? !!ex.paid : false);

/* ---------- CASH FLOW (maalinle) ---------- */
function cashDays(pid){
 var map = {};
 function slot(d){ if(!map[d]) map[d] = { d:d, in:0, lab:0, mw:0, mat:0, own:0 }; return map[d]; }
 for(var i=0;i<DB.payin.length;i++){
  var p = DB.payin[i]; if(pid && p.project_id!=pid) continue;
  slot(p.pdate).in += Number(p.amount)||0;
 }
 for(var a=0;a<DB.attend.length;a++){
  var r = DB.attend[a]; if(pid && r.project_id!=pid) continue;
  if(!r.paid) continue;
  if(isOwner(r.worker_id)) slot(r.adate).mw += Number(r.amount)||0;
  else slot(r.adate).lab += Number(r.amount)||0;
 }
 for(var e=0;e<DB.expense.length;e++){
  var x = DB.expense[e]; if(pid && x.project_id!=pid) continue;
  slot(x.edate).mat += Number(x.amount)||0;
 }
 if(!pid){
  for(var o=0;o<DB.owner.length;o++){ slot(DB.owner[o].odate).own += Number(DB.owner[o].amount)||0; }
 }
 var out = [];
 for(var k in map){ if(map.hasOwnProperty(k)) out.push(map[k]); }
 out.sort(function(a,b){ return a.d < b.d ? -1 : (a.d > b.d ? 1 : 0); });
 var run = 0;
 for(var z=0;z<out.length;z++){
  out[z].net = out[z].in - out[z].lab - out[z].mw - out[z].mat - out[z].own;
  run += out[z].net;
  out[z].bal = run;
 }
 return out;
}

 s += "<button class='sbtn' style='width:100%;margin-top:8px' onclick='closeSheet()'>Jooji</button>";
 openSheet(s);
}
function ownSave(){
 if(num('o_a')<=0){ toast('Qiimaha gali'); return; }
 sbPost('ec_owner',{ odate:val('o_d'), category:val('o_c'), amount:num('o_a'), acct:val('o_ac'), note:val('o_n') })
 .then(function(){ return loadAll(); }).then(function(){ closeSheet(); renderAll(); toast('La kaydiyay'); });
}
function trForm(){
 var s = "<h3>Wareeji akoon</h3><label>Taariikh</label><input id='t_d' type='date' value='"+today()+"'>";
 s += "<label>Ka</label>" + acctOpts('t_f','zaad');
 s += "<label>Ku</label>" + acctOpts('t_t','cash');
 s += "<label>Qiimaha ($)</label><input id='t_a' type='number' inputmode='decimal'>";
 s += "<label>Faallo</label><input id='t_n'>";
 s += "<button class='rbtn' onclick='trSave()'>Wareeji</button>";
 s += "<button class='sbtn' style='width:100%;margin-top:8px' onclick='closeSheet()'>Jooji</button>";
 openSheet(s);
}
function trSave(){
 if(val('t_f')==val('t_t')){ toast('Isku akoon ma noqon karo'); return; }
 if(num('t_a')<=0){ toast('Qiimaha gali'); return; }
 sbPost('ec_transfer',{ tdate:val('t_d'), from_acct:val('t_f'), to_acct:val('t_t'), amount:num('t_a'), note:val('t_n') })
 .then(function(){ return loadAll(); }).then(function(){ closeSheet(); renderAll(); toast('La wareejiyay'); });
}

function payAllUnpaid(){
 if(!confirm('Calaamadi dhammaan yoomiyaha in la bixiyay?')) return;
 var ps = [];
 for(var i=0;i<DB.attend.length;i++){
  var r = DB.attend[i];
  if(!r.paid && Number(r.amount)>0) ps.push(sbPatch('ec_attend',r.id,{paid:true}));
 }
 Promise.all(ps).then(function(){ return loadAll(); }).then(function(){ renderAll(); toast('La bixiyay'); });
}
function shareRep(){
 var t = calcAll(), m = 'WARBIXIN MASHRUUC EC - ' + today() + '\n\n';
 for(var p=0;p<DB.projects.length;p++){
  var pr = DB.projects[p], c = calc(pr.id);
  m += pr.name + '\n  Qandaraas: ' + money(c.contract) + '\n  Kharash: ' + money(c.cost) + '\n  Faaiido: ' + money(c.profit) + '\n\n';
 }
 m += 'WADARTA\nQandaraas: ' + money(t.contract) + '\nKharash: ' + money(t.labor+t.mat) + '\nFaaiido: ' + money(t.profit) + '\nLagu leeyahay: ' + money(t.due);
 if(navigator.share){ navigator.share({ text:m }); }
 else { window.open('https://wa.me/?text='+encodeURIComponent(m),'_blank'); }
}

/* ---------- NAV ---------- */
var TITLES = { dash:'Guriga', proj:'Mashaariic', day:'Maalinta', work:'Shaqaale', rep:'Xisaab' };
function go(p){
 UI.page = p;
 var pgs = document.getElementsByClassName('pg');
 for(var i=0;i<pgs.length;i++) pgs[i].className = 'pg';
 document.getElementById('pg-'+p).className = 'pg act';
 var nis = document.getElementsByClassName('ni');
 for(var j=0;j<nis.length;j++) nis[j].className = nis[j].getAttribute('data-p')==p ? 'ni act' : 'ni';
 document.getElementById('ttl').textContent = TITLES[p];
 renderAll();
}
function renderAll(){
 renderDash(); renderProj(); renderWork(); renderDay(); renderRep();
}

function doLogin(){
 if(val('pin')===APP_PIN){
  try{ localStorage.setItem('ec_auth','1'); }catch(e){}
  document.getElementById('login').className = 'login hide';
  boot();
 } else {
  document.getElementById('lerr').textContent = 'PIN khalad ah';
 }
}
function doLogout(){
 try{ localStorage.removeItem('ec_auth'); }catch(e){}
 document.getElementById('login').className = 'login';
 document.getElementById('pin').value = '';
}
function boot(){
 document.getElementById('sub').textContent = 'Waa la soo dejinayaa...';
 loadAll().then(function(){
  document.getElementById('sub').textContent = DB.projects.length + ' mashruuc &middot; ' + DB.workers.length + ' shaqaale';
  renderAll();
 });
}

function start(){
 document.getElementById('btnLogin').onclick = doLogin;
 document.getElementById('btnOut').onclick = doLogout;
 document.getElementById('pin').onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
 document.getElementById('ovl').onclick = function(e){ if(e.target.id==='ovl') closeSheet(); };
 var nis = document.getElementsByClassName('ni');
 for(var i=0;i<nis.length;i++){
  nis[i].onclick = function(){ go(this.getAttribute('data-p')); };
 }
 UI.day = today(); UI.repTab = 'p';
 var ok = '';
 try{ ok = localStorage.getItem('ec_auth'); }catch(e){}
 if(ok==='1'){ document.getElementById('login').className = 'login hide'; boot(); }

 try{
  var mf = { name:'Mashruuc EC', short_name:'EC', start_url:'.', display:'standalone', background_color:'#0d1117', theme_color:'#0d1117', icons:[] };
  var bl = new Blob([JSON.stringify(mf)],{type:'application/json'});
  var lk = document.createElement('link');
  lk.rel = 'manifest'; lk.href = URL.createObjectURL(bl);
  document.head.appendChild(lk);
 }catch(e){}
}
window.onload = start;
</script>
