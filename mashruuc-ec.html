body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:82px}

.row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bdr)}
.row:last-child{border-bottom:0}
.mut{color:var(--mut);font-size:12px}
.big{font-size:26px;font-weight:800}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-lg{font-size:16px;padding:5px 13px;font-weight:800;letter-spacing:.5px}

.qmoney{font-size:17px;font-weight:800}
.p-gr{background:rgba(46,160,67,.16);color:var(--gr)}
.p-am{background:rgba(240,160,32,.16);color:var(--am)}
.p-rd{background:rgba(229,72,77,.16);color:var(--rd)}
.p-bl{background:rgba(47,129,247,.16);color:var(--bl)}
.p-pu{background:rgba(163,113,247,.18);color:var(--pu)}
.bar{height:9px;background:#0b0f14;border-radius:6px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--gr)}
.empty{text-align:center;color:var(--mut);padding:34px 12px;font-size:14px}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:12px 20px;border-radius:24px;font-size:14px;z-index:200;opacity:0;transition:.25s;pointer-events:none}

.login{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.login.hide{display:none}
.lbox{width:100%;max-width:330px;text-align:center}

.seg3 button{flex:1;background:#0b0f14;border:1px solid var(--bdr);color:var(--mut);border-radius:9px;padding:12px 4px;font-size:13px;font-weight:600}

.seg3 button.ab{background:var(--rd);color:#fff;border-color:var(--rd)}

function h(){ return { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation' }; }
function api(t,q){ return SB_URL+'/rest/v1/'+t+(q?('?'+q):''); }
function chk(r){
 if(r.ok) return r.json();
 return r.json().then(function(e){
  var m = (e && (e.message||e.hint||e.details)) ? (e.message||e.hint||e.details) : ('Khalad '+r.status);

function sbGet(t,q){ return fetch(api(t,q||'select=*'),{headers:h()}).then(function(r){ return r.json(); }).catch(function(){ return []; }); }
function sbPost(t,b){ return fetch(api(t),{method:'POST',headers:h(),body:JSON.stringify(b)}).then(chk); }
function sbUpsert(t,b,c){

function esc(x){
 if(x===null||x===undefined) return '';
 return String(x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function money(n){ n = Number(n)||0; var d = (n % 1 === 0) ? 0 : 2; return '$' + n.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function today(){

function pCode(id){ var p = pById(id); return p ? (p.code||'') : ''; }
function pClient(id){ var p = pById(id); return p ? (p.client||'-') : '-'; }

function pColor(pid){
 for(var i=0;i<DB.projects.length;i++){ if(DB.projects[i].id==pid) return PJ_COLORS[i % PJ_COLORS.length]; }
 return '#8b98a5';
}
function codePill(pid, big){
 var c = pColor(pid);
 var cls = big ? 'pill pill-lg' : 'pill';
 return "<span class='"+cls+"' style='background:"+c+"22;color:"+c+";border:1px solid "+c+"55'>"+esc(pCode(pid)||'-')+"</span>";
}
function nextCode(){
 var mx = 0;
 for(var i=0;i<DB.projects.length;i++){
  var m = String(DB.projects[i].code||'').match(/(\d+)\s*$/);
  if(m && Number(m[1])>mx) mx = Number(m[1]);
 }
 var n = String(mx+1); while(n.length<3) n = '0'+n;
 return 'PRJ-'+n;
}

/* -------- XISAAB -------- */
function pCalc(pid){
 var o = { contract:0, labor:0, ownw:0, exp:0, recv:0, unpaid:0 };
 var p = pById(pid); if(p) o.contract = Number(p.contract_amount)||0;
 for(var a=0;a<DB.attend.length;a++){
  var r = DB.attend[a]; if(r.project_id!=pid) continue;
  var w = wById(r.worker_id);
  if(w && w.is_owner) o.ownw += Number(r.amount)||0;
  else o.labor += Number(r.amount)||0;
  if(!r.paid) o.unpaid += Number(r.amount)||0;
 }
 for(var e=0;e<DB.expense.length;e++){ if(DB.expense[e].project_id==pid) o.exp += Number(DB.expense[e].amount)||0; }
 for(var y=0;y<DB.payin.length;y++){ if(DB.payin[y].project_id==pid) o.recv += Number(DB.payin[y].amount)||0; }
 o.cost = o.labor + o.ownw + o.exp;
 o.paidw = o.labor + o.ownw - o.unpaid;
 o.onhand = o.recv - o.paidw - o.exp;
 o.profit = o.contract - o.cost;
 o.baaqi = o.contract - o.recv; if(o.baaqi<0) o.baaqi = 0;
 o.excess = o.recv > o.contract ? o.recv - o.contract : 0;
 return o;
}
function allCalc(){
 var t = { contract:0, labor:0, ownw:0, exp:0, recv:0, profit:0, baaqi:0, unpaid:0 };
 for(var i=0;i<DB.projects.length;i++){
  var c = pCalc(DB.projects[i].id);
  t.contract += c.contract; t.labor += c.labor; t.ownw += c.ownw; t.exp += c.exp;
  t.recv += c.recv; t.profit += c.profit; t.baaqi += c.baaqi; t.unpaid += c.unpaid;
 }
 return t;
}
function wCalc(wid){
 var o = { days:0, earned:0, paid:0, deyn:0, last:'' };
 for(var a=0;a<DB.attend.length;a++){
  var r = DB.attend[a]; if(r.worker_id!=wid) continue;
  if(r.status=='full') o.days += 1;
  else if(r.status=='half') o.days += 0.5;
  o.earned += Number(r.amount)||0;
  if(r.paid) o.paid += Number(r.amount)||0; else o.deyn += Number(r.amount)||0;
  if(!o.last || r.adate>o.last) o.last = r.adate;
 }
 return o;
}

function loadAll(){

  sbGet('ec_payin','select=*&order=pdate.desc&limit=1000')
 ]).then(function(r){
  DB.projects = (r[0]&&r[0].length!==undefined)?r[0]:[];
  DB.workers  = (r[1]&&r[1].length!==undefined)?r[1]:[];
  DB.rates    = (r[2]&&r[2].length!==undefined)?r[2]:[];
  DB.attend   = (r[3]&&r[3].length!==undefined)?r[3]:[];
  DB.expense  = (r[4]&&r[4].length!==undefined)?r[4]:[];
  DB.payin    = (r[5]&&r[5].length!==undefined)?r[5]:[];
 });
}

 s += "<button class='rbtn' onclick='warbixin()'>&#128202; Warbixin guud (WhatsApp)</button>";
 document.getElementById('pg-home').innerHTML = s;
}
function warbixin(){
 var t = allCalc(), m = 'WARBIXIN - ' + today() + '\n\n';
 for(var i=0;i<DB.projects.length;i++){
  var p = DB.projects[i], c = pCalc(p.id);
  m += (p.code||'') + ' ' + p.name + ' (' + (p.client||'') + ')\n';
  m += '  Qandaraas: ' + money(c.contract) + '\n';
  m += '  La helay: ' + money(c.recv) + '  Baaqi: ' + money(c.baaqi) + '\n';
  m += '  Kharash: ' + money(c.cost) + '  Faaiido: ' + money(c.profit) + '\n\n';
 }
 m += 'WADARTA\nQandaraas: ' + money(t.contract) + '\nLa helay: ' + money(t.recv) + '\nBaaqi: ' + money(t.baaqi) + '\nFaaiido: ' + money(t.profit) + '\nDeyn shaqaale: ' + money(t.unpaid);
 if(navigator.share){ navigator.share({ text:m }); }
 else { window.open('https://wa.me/?text='+encodeURIComponent(m),'_blank'); }
}

/* ============ QANDARAAS ============ */
function renderQan(){
 var s = "<button class='rbtn' onclick='qanForm(0)'>+ Qandaraas cusub</button>";
 for(var i=0;i<DB.projects.length;i++){
  var p = DB.projects[i], c = pCalc(p.id);
  var pc = c.contract>0 ? Math.min(100,Math.round(c.recv/c.contract*100)) : 0;
  s += "<div class='card' onclick='qanDetail("+p.id+")'>";
  s += "<div class='row' style='border:0;padding:0;align-items:flex-start'><span>"+codePill(p.id,1)+"</span>";
  s += "<span class='pill "+(p.status=='dhamaaday'?'p-gr':'p-am')+"'>"+(p.status=='dhamaaday'?'Dhamaaday':'Socda')+"</span></div>";
  s += "<div class='qtitle' style='margin-top:6px'>"+esc(p.client||p.name||'-')+"</div>";
  s += "<div class='mut'>"+esc(p.name||'')+(p.location?" &#183; "+esc(p.location):"")+"</div>";
  s += "<div class='row' style='border:0;padding:10px 0 0'><span class='qmoney'>Qandaraas "+money(c.contract)+"</span><span class='qmoney' style='color:var(--gr)'>La helay "+money(c.recv)+"</span></div>";
  s += "<div class='bar'><i style='width:"+pc+"%'></i></div>";
  s += "<div class='row' style='border:0;padding:6px 0 0'><span class='mut'>Baaqi</span><b style='color:var(--am)'>"+money(c.baaqi)+"</b></div>";
  s += "<div class='row' style='border:0;padding:2px 0 0'><span class='mut'>Kharash + yoomiye</span><b style='color:var(--rd)'>-"+money(c.cost)+"</b></div>";
  s += "<div class='row' style='border:0;padding:2px 0 0'><span class='mut'>Gacanta ku haya</span><b style='color:"+(c.onhand>=0?'var(--bl)':'var(--rd)')+"'>"+money(c.onhand)+"</b></div>";
  s += "<div class='row' style='border:0;padding:2px 0 0'><b>Faa'iidada hadda</b><b style='color:"+(c.profit>=0?'var(--gr)':'var(--rd)')+"'>"+money(c.profit)+"</b></div>";
  s += "</div>";
 }
 if(!DB.projects.length) s += "<div class='empty'>Wali qandaraas ma jiro.</div>";
 document.getElementById('pg-qan').innerHTML = s;
}
function qanForm(id){

 var s = "<h3>"+(id?'Wax ka bedel':'Qandaraas cusub')+"</h3>";
 s += "<label>Lambarka (project number)</label><input id='q_code' value=\""+esc(p.code)+"\">";
 s += "<label>Magaca shaqada</label><input id='q_name' placeholder='Guri 5 qol - laydh' value=\""+esc(p.name)+"\">";
 s += "<label>Shirkadda aad ka qaadatay</label><input id='q_client' value=\""+esc(p.client)+"\">";

 var used = {};

function bulkSave(){
 var pj = Number(val('b_pj'))||0;
 var rows = [];
 for(var i=0;i<BULK.length;i++){
  if(BULK[i].n && String(BULK[i].n).replace(/\s/g,'')!=='') rows.push(BULK[i]);
 }
 if(!rows.length){ toast('Magac ugu yaraan hal qof gali'); return; }
 var chain = Promise.resolve();
 for(var j=0;j<rows.length;j++){
  (function(x){
   chain = chain.then(function(){
    return sbPost('ec_workers',{ name:x.n, phone:x.t, is_owner:false }).then(function(res){
     var wid = (res && res[0]) ? res[0].id : 0;
     if(wid) return sbUpsert('ec_rates',[{ project_id:pj, worker_id:wid, rate:Number(x.r)||0 }],'project_id,worker_id');
    });
   });
  })(rows[j]);
 }
 chain.then(function(){ return loadAll(); })
 .then(function(){ BULK = []; closeSheet(); renderAll(); toast(rows.length + ' shaqaale la kaydiyay'); })
 .catch(fail);
}
function shqSave(id){
 var b = { name:val('w_name'), phone:val('w_ph'), is_owner: val('w_ow')=='1' };
 if(!b.name){ toast('Magaca gali'); return; }
 if(!DB.projects.length){ toast('Marka hore qandaraas samee'); return; }
 var pj = Number(val('w_pj'))||0, rate = num('w_rate');
 var pr = id ? sbPatch('ec_workers',id,b) : sbPost('ec_workers',b);
 pr.then(function(res){
  var wid = id;
  if(!wid && res && res[0]) wid = res[0].id;
  if(!wid) return;
  var old = wRate(wid), ops = [];
  if(old && old.project_id!=pj) ops.push(sbDel('ec_rates',old.id));
  ops.push(sbUpsert('ec_rates',[{ project_id:pj, worker_id:wid, rate:rate }],'project_id,worker_id'));
  return Promise.all(ops);
 })
 .then(function(){ return loadAll(); })
 .then(function(){ closeSheet(); renderAll(); toast('La kaydiyay'); })
 .catch(fail);
}

 m += "Qandaraas guud: " + money(c.contract) + "\n";
 m += "==================\n";
 m += "*Lacagihii la bixiyay:*\n";
 if(pays.length){
  var run = 0;

   run += Number(x.amount)||0;

   m += (j+1) + ". " + x.pdate + " - " + money(x.amount) + " (" + acctLbl + ")";

function diag(){
 var tabs = ['ec_projects','ec_workers','ec_rates','ec_attend','ec_expense','ec_payin'];
 openSheet("<h3>Tijaabinta xiriirka</h3><div class='mut'>Waa la hubinayaa...</div>");

 var out = "<h3>Tijaabinta xiriirka</h3>";
 out += "<div class='card'><div class='row' style='border:0;padding:0'><span class='mut'>Supabase project</span><b>"+esc(host)+"</b></div></div>";
 var ps = [];
 for(var i=0;i<tabs.length;i++){
  (function(t){
   ps.push(fetch(api(t,'select=id&limit=1'),{headers:h()}).then(function(r){
    if(r.ok) return { t:t, ok:1, msg:'OK' };
    return r.json().then(function(e){ return { t:t, ok:0, msg:(e&&e.message)?e.message:('HTTP '+r.status) }; },
                         function(){ return { t:t, ok:0, msg:'HTTP '+r.status }; });
   }, function(){ return { t:t, ok:0, msg:'Isku xirku waa fashilmay' }; }));
  })(tabs[i]);
 }
 Promise.all(ps).then(function(res){
  out += "<div class='card'>";
  for(var j=0;j<res.length;j++){
   out += "<div class='row'><span>"+esc(res[j].t)+"</span><span>"+(res[j].ok?"<span class='pill p-gr'>OK</span>":"<span class='pill p-rd'>KHALAD</span>")+"</span></div>";
  }
  out += "</div>";
  return sbPost('ec_projects',{ name:'__TIJAABO__', contract_amount:0 }).then(function(r){
   var id = (r && r[0] && r[0].id) ? r[0].id : 0;
   out += "<div class='card'><b style='color:var(--gr)'>&#10003; Qorista way shaqaysaa</b></div>";
   if(id) return sbDel('ec_projects',id);
  }).catch(function(e){
   out += "<div class='card' style='border-color:var(--rd)'><b style='color:var(--rd)'>&#10007; Qoristu ma shaqaynayso</b><div class='mut' style='margin-top:4px'>"+esc(e.message)+"</div></div>";
  }).then(function(){
   out += "<button class='sbtn' style='width:100%;margin-bottom:8px' onclick='pinForm()'>Beddel PIN-ka</button>";
   out += "<button class='sbtn' style='width:100%;margin-bottom:8px' onclick='adminAsk(\"sbForm\")'>Beddel xiriirka Supabase</button>";
   out += "<button class='sbtn dng' style='width:100%;margin-bottom:8px' onclick='adminAsk(\"wipeForm\")'>&#9888; Tirtir dhammaan xogta</button>";
   out += "<button class='sbtn' style='width:100%' onclick='closeSheet()'>Xir</button>";
   document.getElementById('sheet').innerHTML = out;
   loadAll().then(renderAll);
  });
 });
}

/* ============ LICENSE CHECK ============ */
function licLock(msg){
 var d = document.getElementById('liclock');
 if(!d){
  d = document.createElement('div');
  d.id = 'liclock';
  d.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center';
  document.body.appendChild(d);
 }
 var s = "<div>";
 s += "<div style='font-size:44px'>&#128274;</div>";
 s += "<h2 style='margin:10px 0 6px'>Adeeggu waa xidhan yahay</h2>";
 s += "<p class='mut' style='margin:0 0 18px;max-width:300px'>" + msg + "</p>";
 s += "<p style='margin:0 0 18px'><b>La xiriir Hansan Electric</b></p>";
 s += "<button class='rbtn' style='width:100%;max-width:280px' onclick='licStart()'>Isku day mar kale</button>";
 s += "</div>";
 d.innerHTML = s;
 d.style.display = 'flex';
}
function licHide(){
 var d = document.getElementById('liclock');
 if(d) d.style.display = 'none';
}
function licStart(){
 if(!LIC_WORKER || !LIC_CODE) return;
 fetch(LIC_WORKER + '/check?code=' + encodeURIComponent(LIC_CODE))
 .then(function(r){ return r.json(); })
 .then(function(d){
  if(d && d.ok){
   try{ localStorage.setItem('ec_lic_ok', JSON.stringify({ ts:Date.now(), expiry:d.expiry })); }catch(e){}
   licHide();
  } else {
   var rs = d ? d.reason : '';
   if(rs==='expired') licLock('Muddadii adeeggu way dhammaatay. Fadlan lacagta bixi si adeeggu kuu furmo.');
   else if(rs==='blocked') licLock('Adeeggan waa la joojiyay. Fadlan lacagta bixi si adeeggu kuu furmo.');
   else licLock('License-kan lama helin. Fadlan la xiriir Hansan.');
  }
 })
 .catch(function(){
  var c = null;
  try{ c = JSON.parse(localStorage.getItem('ec_lic_ok')); }catch(e){}
  var ok = false;
  if(c && c.ts && (Date.now() - c.ts) < LIC_GRACE_DAYS*86400000){
   var today = new Date().toISOString().slice(0,10);
   if(!c.expiry || c.expiry >= today) ok = true;
  }
  if(ok) licHide();
  else licLock('Internet lama helin, license-kana lama hubin karo. Ku noqo goob internet leh.');
 });
}
